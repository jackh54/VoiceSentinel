version: '3.8'

services:
  voicesentinel-processor:
    build: .
    container_name: voicesentinel-processor
    restart: unless-stopped
    ports:
      - "28472:28472"
    volumes:
      - ./config.json:/app/config.json
      - ./recordings:/app/recordings
      - whisper_cache:/tmp/whisper_cache
    environment:
      - CONFIG_PATH=/app/config.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:28472/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  whisper_cache:
